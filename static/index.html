  <h1>Metric Fetch Test</h1>
  <button id="btn">Run API calls</button>
  <div id="results"></div>
  <script>
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    // ── /api/a1 ─────────────────────────────────────────────────────────────
    // Response: [{"key1": val, ...}, {...}, ...]
    // Normalise to: { "key1": [vals], "key2": [vals], ... }
    async function fetchA1() {
      const f0 = performance.now();                     // ← fetch start
      const res = await fetch('/api/a1');
      const raw = await res.arrayBuffer();              // body fully received
      const fetchTime = performance.now() - f0;         // ← fetch stop
      const t0 = performance.now();                     // ← parse start
      const arr = JSON.parse(new TextDecoder().decode(raw));
      const a1Data = {};
      for (const obj of arr) {
        for (const [k, v] of Object.entries(obj)) {
          if (!a1Data[k]) a1Data[k] = [];
          a1Data[k].push(v);
        }
      }
      return { fetchTime, parseTime: performance.now() - t0 };
    }

    // ── /api/a2 ─────────────────────────────────────────────────────────────
    // Response: {"header": ["key1", ...], "values": [[v1, v2, ...], [...]]}
    // Normalise to: { "key1": [vals], "key2": [vals], ... }
    async function fetchA2() {
      const f0 = performance.now();                     // ← fetch start
      const res = await fetch('/api/a2');
      const raw = await res.arrayBuffer();              // body fully received
      const fetchTime = performance.now() - f0;         // ← fetch stop
      const t0 = performance.now();                     // ← parse start
      const data = JSON.parse(new TextDecoder().decode(raw));
      const a2Data = {};
      for (const key of data.header) a2Data[key] = [];
      for (const row of data.values) {
        for (let i = 0; i < data.header.length; i++) {
          a2Data[data.header[i]].push(row[i]);
        }
      }
      return { fetchTime, parseTime: performance.now() - t0 };
    }

    // ── /api/a3 ─────────────────────────────────────────────────────────────
    // Response: multipart
    //   Part 1 JSON: [{"bytes":2,"name":"key","type":"int"}, ...]
    //   Part 2 binary: all values packed as u16 little-endian
    // Normalise to: { "key1": [vals], "key2": [vals], ... }
    async function fetchA3() {
      const f0 = performance.now();                     // ← fetch start
      const res = await fetch('/api/a3');
      const boundary = res.headers.get('Content-Type').split('boundary=')[1];
      const raw = await res.arrayBuffer();              // body fully received
      const fetchTime = performance.now() - f0;         // ← fetch stop
      const t0 = performance.now();                     // ← parse start

      const bytes = new Uint8Array(raw);
      const enc = new TextEncoder();
      const dec = new TextDecoder();

      function indexOfBytes(haystack, needle, start) {
        outer: for (let i = start; i <= haystack.length - needle.length; i++) {
          for (let j = 0; j < needle.length; j++) {
            if (haystack[i + j] !== needle[j]) continue outer;
          }
          return i;
        }
        return -1;
      }

      const crlfcrlf = enc.encode('\r\n\r\n');
      const firstBound = enc.encode('--' + boundary + '\r\n');
      const nextBound = enc.encode('\r\n--' + boundary);
      const finalBound = enc.encode('\r\n--' + boundary + '--');

      // Part 1: JSON schema
      let pos = firstBound.length;
      let bodyStart = indexOfBytes(bytes, crlfcrlf, pos) + 4;
      let bodyEnd = indexOfBytes(bytes, nextBound, bodyStart);
      const schema = JSON.parse(dec.decode(bytes.slice(bodyStart, bodyEnd)));
      const keys = schema.map(s => s.name);
      const nFields = keys.length;

      // Part 2: raw binary (skip the \r\n after boundary marker)
      pos = bodyEnd + nextBound.length + 2;
      bodyStart = indexOfBytes(bytes, crlfcrlf, pos) + 4;
      bodyEnd = indexOfBytes(bytes, finalBound, bodyStart);

      const binView = new DataView(raw, bodyStart, bodyEnd - bodyStart);
      const nRows = (bodyEnd - bodyStart) / (nFields * 2);

      const a3Data = {};
      for (const key of keys) a3Data[key] = new Array(nRows);
      for (let r = 0; r < nRows; r++) {
        for (let f = 0; f < nFields; f++) {
          a3Data[keys[f]][r] = binView.getUint16((r * nFields + f) * 2, true); // LE
        }
      }
      return { fetchTime, parseTime: performance.now() - t0 };
    }

      const crlfcrlf = enc.encode('\r\n\r\n');

      // Part 2: raw binary

    // ── /api/c1 ─────────────────────────────────────────────────────────────
    // Response: [{"key1": val, ...}, {...}, ...]  (BLOB decoded server-side to JSON)

    // ── /api/c2 ─────────────────────────────────────────────────────────────
    // Response: {"header": ["key1", ...], "values": [[v1, v2, ...], [...]]}

    async function fetchC2() {

    // ── /api/c3 ─────────────────────────────────────────────────────────────
    // Response: multipart (same structure as /api/a3 and /api/b3)
    // Normalise to: { "key1": [vals], "key2": [vals], ... }

      return { fetchTime, parseTime: performance.now() - t0 };
    }

    document.getElementById('btn').addEventListener('click', async () => {
      const out = document.getElementById('results');
      out.textContent = 'Warming up...';

      // ── Step 1: Warmup – 1 req each, discard ────────────────────────
      await fetchA1();
      await fetchA2();
      await fetchA3();
      await fetchB1();
      await fetchB2();
      await fetchB3();
      await fetchC1();
      await fetchC2();
      await fetchC3();

      // ── Step 2: Wait 1 s ────────────────────────────────────────────
      await sleep(1000);

      // ── Step 3: /api/a1 × 10 ────────────────────────────────────────
      out.textContent = 'Benchmarking /api/a1...';
      const timesA1 = [], fetchTimesA1 = [];
      for (let i = 0; i < 10; i++) { const r = await fetchA1(); timesA1.push(r.parseTime); fetchTimesA1.push(r.fetchTime); }
      const avgA1 = timesA1.reduce((a, b) => a + b, 0) / timesA1.length;
      const avgFetchA1 = fetchTimesA1.reduce((a, b) => a + b, 0) / fetchTimesA1.length;

      await sleep(1000);
